<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="indigo">

<head>
  <script>
    // Restore theme + accent + transparency before first paint (no FOUC)
    (function () {
      try {
        const get = (k, d) => { try { return JSON.parse(localStorage.getItem(k)).data; } catch (e) { return d; } };
        const root = document.documentElement;
        root.setAttribute('data-theme', get('swr_cache_theme_mode', 'dark') || 'dark');
        root.setAttribute('data-accent', get('swr_cache_theme_accent', 'indigo') || 'indigo');
        const glass = get('swr_cache_theme_glass', 'on');
        if (glass === 'off') root.setAttribute('data-glass', 'off');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Plan smarter. Grow daily. Your personal companion for productivity and growth with Ascend." />
  <title>Ascend</title>

  <meta name="theme-color" content="#06070C" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Ascend" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
</head>

<body>
  <!-- Splash (removed by App.svelte once mounted) -->
  <div id="app-splash" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-logo">
        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M32 8 L52 52 L32 42 L12 52 Z" fill="url(#sg)" />
          <defs>
            <linearGradient id="sg" x1="12" y1="8" x2="52" y2="52" gradientUnits="userSpaceOnUse">
              <stop stop-color="#8B9EFF" /><stop offset="1" stop-color="#5BE0FF" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="splash-title">Ascend</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div id="app"></div>

  <script type="module" src="/src/main.js"></script>

  <style>
    #app-splash {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      background: #06070C;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #app-splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-inner { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    .splash-logo { width: 76px; height: 76px; animation: splash-pop .7s cubic-bezier(.2,.9,.2,1.2); filter: drop-shadow(0 8px 30px rgba(99,130,255,.45)); }
    .splash-logo svg { width: 100%; height: 100%; }
    .splash-title {
      font-family: "Inter", system-ui, sans-serif; font-size: 26px; font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(110deg, #8B9EFF, #5BE0FF); -webkit-background-clip: text;
      background-clip: text; color: transparent;
    }
    .splash-dots { display: flex; gap: 7px; }
    .splash-dots span { width: 7px; height: 7px; border-radius: 50%; background: #5B8CFF; opacity: .4; animation: splash-dot 1.2s infinite ease-in-out; }
    .splash-dots span:nth-child(2) { animation-delay: .2s; }
    .splash-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes splash-dot { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-5px); } }
    @keyframes splash-pop { 0% { transform: scale(.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .splash-logo, .splash-dots span { animation: none; } }
  </style>
</body>

</html>
